document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2e571248-67a3-42e0-afe6-fd113af0cf9d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bd751e6c-5443-40ae-83ac-212e10a64672\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ac5dbf6c-d020-4953-8931-8362115eaed0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2e571248-67a3-42e0-afe6-fd113af0cf9d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- Core palette ---------- */\n  --astro-noir:        #1B1B1E;   /* primary surface */\n  --astro-noir-deep:   #0E0E10;   /* deeper void / page bg */\n  --astro-noir-rise:   #25252A;   /* one step up */\n  --astro-noir-crest:  #2F2F36;   /* highest neutral surface */\n\n  --quantum-teal:      #00B4D8;   /* primary accent — info / engineering */\n  --quantum-teal-glow: #4FD1E8;   /* hover / highlight */\n  --quantum-teal-deep: #007A93;   /* pressed / shadow rim */\n  --quantum-teal-bleed:rgba(0,180,216,0.35); /* SSS bleed */\n\n  --plasma-orchid:     #7B2CBF;   /* secondary accent — soul / signature */\n  --plasma-orchid-glow:#A65BE0;\n  --plasma-orchid-deep:#4A1B73;\n  --plasma-orchid-bleed:rgba(123,44,191,0.35);\n\n  /* ---------- Semantic neutrals ---------- */\n  --bg:                var(--astro-noir-deep);\n  --surface-1:         var(--astro-noir);\n  --surface-2:         var(--astro-noir-rise);\n  --surface-3:         var(--astro-noir-crest);\n\n  --fg-1:              #F4F4F7;   /* primary text */\n  --fg-2:              #B7B7C2;   /* secondary text */\n  --fg-3:              #6E6E7A;   /* tertiary / metadata */\n  --fg-4:              #3F3F48;   /* faintest, disabled */\n\n  --hairline:          rgba(255,255,255,0.06);\n  --hairline-strong:   rgba(255,255,255,0.12);\n  --rim-light:         rgba(255,255,255,0.18);\n  --rim-shadow:        rgba(0,0,0,0.65);\n\n  /* ---------- Status ---------- */\n  --signal-render:     #00B4D8;   /* teal — engineering / processing */\n  --signal-soul:       #7B2CBF;   /* orchid — creative / signature */\n  --signal-success:    #4ADE80;   /* used sparingly */\n  --signal-warn:       #F5A524;\n  --signal-error:      #F43F5E;\n\n  /* ---------- Type ----------\n     Two-axis \"Advanced Upscale\" tension:\n       headers  → Playfair Display 900, tight  (-0.02em)\n       data     → JetBrains Mono 400, breathing (+0.1em)\n     Orbitron stays as the engineering display face for chrome (eyebrows,\n     button caps, labels) where the cinematic-couture serif would feel too\n     editorial. */\n  --font-couture:      'Playfair Display', 'Didot', 'Bodoni MT', serif;\n  --font-display:      'Orbitron', 'Eurostile', 'Bank Gothic', sans-serif;\n  --font-body:         'Space Grotesk', 'Inter', system-ui, sans-serif;\n  --font-mono:         'JetBrains Mono', 'IBM Plex Mono', monospace;\n\n  --tracking-couture:  -0.02em;\n  --tracking-data:      0.10em;\n  --tracking-display:   0.12em;\n  --tracking-wordmark:  0.22em;\n  --tracking-eyebrow:   0.32em;\n  --tracking-body:      0.005em;\n\n  /* The signature header glow — Quantum Teal, subtle. Layered for depth:\n     a tight inner halo + a wider soft bloom. */\n  --glow-header:\n    0 0 1px rgba(0,180,216,0.55),\n    0 0 12px rgba(0,180,216,0.35),\n    0 0 32px rgba(0,180,216,0.18);\n\n  /* Reduced-glow fallback for body-sized couture (≤24px) to keep small text legible. */\n  --glow-header-sm:\n    0 0 1px rgba(0,180,216,0.5),\n    0 0 8px rgba(0,180,216,0.25);\n\n  /* ---------- Spacing (4px base) ---------- */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 24px;\n  --s-6: 32px;\n  --s-7: 48px;\n  --s-8: 64px;\n  --s-9: 96px;\n  --s-10:128px;\n\n  /* ---------- Radii — o-rings are always pill or full ---------- */\n  --r-pill:     999px;\n  --r-card:     20px;     /* default card */\n  --r-card-sm:  14px;\n  --r-tile:     8px;\n  --r-chip:     6px;\n\n  /* ---------- Elevation / shadow system ----------\n     Cinematic SSS shadows: hard rim, soft drop, faint accent bleed. */\n  --elev-1:\n    inset 0 1px 0 var(--rim-light),\n    inset 0 -1px 0 rgba(0,0,0,0.45),\n    0 1px 1px rgba(0,0,0,0.25),\n    0 6px 18px rgba(0,0,0,0.55);\n\n  --elev-2:\n    inset 0 1px 0 var(--rim-light),\n    inset 0 -1px 0 rgba(0,0,0,0.55),\n    0 2px 2px rgba(0,0,0,0.3),\n    0 14px 36px rgba(0,0,0,0.65),\n    0 0 0 1px var(--hairline);\n\n  --elev-3:\n    inset 0 1px 0 var(--rim-light),\n    inset 0 -2px 0 rgba(0,0,0,0.6),\n    0 24px 64px rgba(0,0,0,0.75),\n    0 0 0 1px var(--hairline-strong);\n\n  --glow-teal:    0 0 24px rgba(0,180,216,0.45), 0 0 64px rgba(0,180,216,0.15);\n  --glow-orchid:  0 0 24px rgba(123,44,191,0.45), 0 0 64px rgba(123,44,191,0.15);\n\n  /* ---------- Motion ---------- */\n  --ease-quantum: cubic-bezier(0.2, 0.8, 0.2, 1);   /* default UI ease */\n  --ease-cine:    cubic-bezier(0.65, 0, 0.35, 1);   /* cinematic in/out */\n  --ease-thrust:  cubic-bezier(0.4, 0, 0.1, 1);     /* heavy entry */\n  --t-fast:   140ms;\n  --t-base:   220ms;\n  --t-slow:   420ms;\n  --t-cine:   720ms;\n}\n\n/* =========================================================================\n   Base\n   ========================================================================= */\nhtml, body {\n  background: var(--bg);\n  color: var(--fg-1);\n  font-family: var(--font-body);\n  font-size: 15px;\n  line-height: 1.55;\n  letter-spacing: var(--tracking-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* =========================================================================\n   Type scale — semantic\n   ========================================================================= */\n.q-eyebrow {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 11px;\n  letter-spacing: var(--tracking-eyebrow);\n  text-transform: uppercase;\n  color: var(--quantum-teal);\n}\n\n.q-wordmark {\n  font-family: var(--font-display);\n  font-weight: 800;\n  letter-spacing: var(--tracking-wordmark);\n  text-transform: uppercase;\n}\n\n/* ---------- Couture headers ----------\n   Playfair Display 900, tight tracking, optical SSS-teal glow.\n   This is the primary header treatment. Use sentence case or Title Case;\n   uppercase reads too brutalist on a high-contrast didone. */\n.q-h1 {\n  font-family: var(--font-couture);\n  font-weight: 900;\n  font-size: clamp(56px, 7vw, 104px);\n  line-height: 0.98;\n  letter-spacing: var(--tracking-couture);\n  color: var(--fg-1);\n  text-shadow: var(--glow-header);\n}\n\n.q-h2 {\n  font-family: var(--font-couture);\n  font-weight: 900;\n  font-size: clamp(36px, 4.4vw, 64px);\n  line-height: 1.02;\n  letter-spacing: var(--tracking-couture);\n  color: var(--fg-1);\n  text-shadow: var(--glow-header);\n}\n\n.q-h3 {\n  font-family: var(--font-couture);\n  font-weight: 800;\n  font-size: 28px;\n  line-height: 1.15;\n  letter-spacing: var(--tracking-couture);\n  color: var(--fg-1);\n  text-shadow: var(--glow-header-sm);\n}\n\n/* Engineering display — Orbitron — for button caps, eyebrows, machine labels.\n   Kept as a separate class; do NOT use on prose headings. */\n.q-display {\n  font-family: var(--font-display);\n  font-weight: 700;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n}\n\n.q-h4 {\n  font-family: var(--font-body);\n  font-weight: 600;\n  font-size: 18px;\n  line-height: 1.3;\n  letter-spacing: 0.01em;\n}\n\n.q-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 15px;\n  line-height: 1.6;\n  color: var(--fg-2);\n}\n\n.q-body-lg {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: 18px;\n  line-height: 1.55;\n  color: var(--fg-2);\n}\n\n.q-meta {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: 11px;\n  letter-spacing: var(--tracking-data);\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n\n/* ---------- Data / 44-bit performance metrics ----------\n   JetBrains Mono 400, +0.1em tracking. Engineered to sit comfortably next to\n   tight couture headers without competing — wide breath, not loud color. */\n.q-data {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: 13px;\n  line-height: 1.5;\n  letter-spacing: var(--tracking-data);\n  color: var(--fg-2);\n}\n\n.q-data--num {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: 22px;\n  letter-spacing: var(--tracking-data);\n  color: var(--fg-1);\n  font-variant-numeric: tabular-nums;\n}\n\n.q-data--lbl {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: 10px;\n  letter-spacing: var(--tracking-data);\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n\n.q-code {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: 13px;\n  color: var(--quantum-teal-glow);\n  background: rgba(0,180,216,0.06);\n  padding: 2px 6px;\n  border-radius: var(--r-chip);\n  border: 1px solid rgba(0,180,216,0.18);\n}\n\n/* Pure HTML semantic mapping — couture for prose headings, data for mono. */\nh1 { font: 900 72px/0.98 var(--font-couture); letter-spacing: -0.02em; color: var(--fg-1); text-shadow: var(--glow-header); margin: 0; }\nh2 { font: 900 48px/1.02 var(--font-couture); letter-spacing: -0.02em; color: var(--fg-1); text-shadow: var(--glow-header); margin: 0; }\nh3 { font: 800 28px/1.15 var(--font-couture); letter-spacing: -0.02em; color: var(--fg-1); text-shadow: var(--glow-header-sm); margin: 0; }\np  { font-family: var(--font-body); font-size: 15px; line-height: 1.6; color: var(--fg-2); margin: 0; }\nsmall { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--fg-3); }\ncode { font-family: var(--font-mono); letter-spacing: 0.10em; color: var(--quantum-teal-glow); }\n\n\n/* =========================================================================\n   THE O-RING SSS MATERIAL\n   The signature material. Used on buttons, chips, toggles, knobs, cards.\n   Mixin-style classes — combine .q-oring with a modifier for color.\n   ========================================================================= */\n\n.q-oring {\n  position: relative;\n  isolation: isolate;\n  border-radius: var(--r-pill);\n  background:\n    /* hot top highlight */\n    linear-gradient(180deg,\n      rgba(255,255,255,0.22) 0%,\n      rgba(255,255,255,0.06) 18%,\n      rgba(255,255,255,0)    42%),\n    /* under-belly SSS bleed (set per modifier) */\n    radial-gradient(140% 90% at 50% 115%,\n      var(--oring-bleed, rgba(255,255,255,0.18)) 0%,\n      transparent 60%),\n    /* mid tone */\n    linear-gradient(180deg,\n      var(--oring-top, #2E2E36) 0%,\n      var(--oring-mid, #1B1B1E) 55%,\n      var(--oring-bot, #101013) 100%);\n  box-shadow:\n    /* inner sculpt */\n    inset 0 1px 0 rgba(255,255,255,0.28),\n    inset 0 -1px 0 rgba(0,0,0,0.7),\n    inset 0 0 0 1px rgba(255,255,255,0.04),\n    inset 0 -10px 18px rgba(0,0,0,0.45),\n    inset 0 10px 18px rgba(255,255,255,0.04),\n    /* drop */\n    0 1px 0 rgba(255,255,255,0.04),\n    0 8px 18px rgba(0,0,0,0.55),\n    0 22px 48px rgba(0,0,0,0.45),\n    /* outer rim hairline */\n    0 0 0 1px var(--oring-rim, rgba(255,255,255,0.08));\n  transition:\n    transform var(--t-base) var(--ease-quantum),\n    box-shadow var(--t-base) var(--ease-quantum),\n    filter var(--t-base) var(--ease-quantum);\n}\n\n/* The signature top \"wet\" gloss streak */\n.q-oring::before {\n  content: \"\";\n  position: absolute;\n  inset: 1px 6% auto 6%;\n  height: 42%;\n  border-radius: 999px;\n  background: linear-gradient(180deg,\n    rgba(255,255,255,0.45) 0%,\n    rgba(255,255,255,0.10) 55%,\n    rgba(255,255,255,0)    100%);\n  filter: blur(0.4px);\n  pointer-events: none;\n  z-index: 1;\n  opacity: 0.9;\n}\n\n/* Soft caustic glow under the ring (the \"subsurface bleed\") */\n.q-oring::after {\n  content: \"\";\n  position: absolute;\n  inset: 60% -2% -40% -2%;\n  border-radius: 999px;\n  background: radial-gradient(60% 100% at 50% 0%,\n    var(--oring-caustic, rgba(0,180,216,0.55)) 0%,\n    transparent 70%);\n  filter: blur(14px);\n  pointer-events: none;\n  z-index: -1;\n  opacity: 0.85;\n}\n\n/* ----- modifiers ----- */\n.q-oring--noir {\n  --oring-top: #34343B;\n  --oring-mid: #1F1F23;\n  --oring-bot: #0E0E11;\n  --oring-bleed: rgba(255,255,255,0.10);\n  --oring-rim: rgba(255,255,255,0.10);\n  --oring-caustic: rgba(0,180,216,0.20);\n}\n.q-oring--teal {\n  --oring-top: #18C9EF;\n  --oring-mid: #00B4D8;\n  --oring-bot: #00637A;\n  --oring-bleed: rgba(120,234,255,0.55);\n  --oring-rim: rgba(0,180,216,0.55);\n  --oring-caustic: rgba(0,180,216,0.85);\n  color: #001a22;\n}\n.q-oring--orchid {\n  --oring-top: #A65BE0;\n  --oring-mid: #7B2CBF;\n  --oring-bot: #3F1668;\n  --oring-bleed: rgba(190,130,240,0.55);\n  --oring-rim: rgba(166,91,224,0.55);\n  --oring-caustic: rgba(123,44,191,0.85);\n  color: #f6ecff;\n}\n.q-oring--ghost {\n  --oring-top: #2A2A30;\n  --oring-mid: #1B1B1E;\n  --oring-bot:
